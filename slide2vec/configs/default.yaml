csv: # path to csv containing slide paths

output_dir: "output" # output directory
resume: false # resume from a previous run
resume_dirname: # directory name to resume from

save_tiles: false # save extracted tiles as {sample_id}.tiles.tar in addition to coordinate artifacts

seed: 0 # seed for reproducibility

model:
  name: # preset model name; see docs/models.md for supported request strings
  output_variant: # requested output variant for presets that expose multiple outputs
  batch_size: 32
  save_tile_embeddings: false # whether to save tile embeddings alongside the pooled slide embedding when level is "slide"
  save_slide_embeddings: false # whether to save per-slide embeddings when level is "patient" (e.g. moozy); requires a 'patient_id' column in the input CSV
  save_latents: false # whether to save the latent representations from the model alongside the slide embedding (only supported for 'prism')
  allow_non_recommended_settings: false # when true, non-recommended spacing / tile size / precision combinations warn instead of erroring

tiling:
  on_the_fly: true # read tiles directly from WSI during embedding (requires cucim backend)
  gpu_decode: false # GPU-accelerated batch decoding via device="cuda" in cucim read_region; set true to opt in when the runtime is configured for it (experimental, may not be stable across all environments)
  adaptive_batching: false # when true, vary batch size to align with super tile boundaries (avoids redundant reads but batch size fluctuates)
  use_supertiles: true # group tiles into 8x8/4x4/2x2 super tile reads to reduce WSI read calls (on-the-fly path only)
  jpeg_backend: "turbojpeg" # JPEG encoder for tar extraction: "turbojpeg" (faster) or "pil" (compatible with older ground truth fixtures)
  read_coordinates_from: # path to an existing directory containing pre-extracted `.coordinates.npz` / `.coordinates.meta.json` artifacts to reuse instead of starting tiling from scratch
  read_tiles_from: # path to an existing directory containing pre-extracted `.tiles.tar` tile stores to reuse instead of starting tiling from scratch
  backend: "auto" # backend to use for slide reading; "auto" lets hs2p resolve the best backend per slide, preferring cuCIM when available
  params:
    requested_spacing_um: # spacing at which to tile the slide, in microns per pixel; filled from a preset model when available
    tolerance: 0.05 # tolerance for matching the spacing (float between 0 and 1, deciding how much the spacing can deviate from the one specified in the slide metadata)
    requested_tile_size_px: # size of the tiles to extract, in pixels; filled from a preset model when available
    requested_region_size_px: # size of hierarchical parent regions in pixels; when unset and region_tile_multiple is set, derived from requested_tile_size_px * region_tile_multiple
    region_tile_multiple: # hierarchical region grid width/height in tiles; e.g. 6 means 6x6 tiles per region
    overlap: 0.0 # percentage of overlap between two consecutive tiles (float between 0 and 1)
    tissue_threshold: 0.1 # minimum fraction of pixels that must be tissue to keep a tile (float between 0 and 1)
  seg_params:
    # downsample controls which pyramid level is read for tissue segmentation.
    # Larger values are faster and use less memory; smaller values can improve mask precision.
    downsample: 64 # find the closest downsample in the slide for tissue segmentation
    sthresh: 8 # segmentation threshold (positive integer, using a higher threshold leads to less foreground and more background detection) (not used when method="otsu")
    sthresh_up: 255 # upper threshold value for scaling the binary mask
    mthresh: 7 # median filter size (positive, odd integer)
    close: 4 # additional morphological closing to apply following initial thresholding (positive integer)
    method: "hsv" # tissue segmentation method: "hsv", "otsu", "threshold", or "sam2"
    sam2_checkpoint_path: # optional when method="sam2"; if empty, hs2p downloads the default AtlasPatch checkpoint from Hugging Face
    sam2_config_path: # optional local override for the SAM2 model config; if empty, hs2p downloads the default AtlasPatch config from Hugging Face
    sam2_device: "cpu" # device for SAM2 inference, e.g. "cpu", "cuda", or "cuda:0"
    sam2_num_workers: # optional cap on concurrent SAM2 mask-resolution workers; set to 1 to serialize GPU inference and avoid CUDA OOMs
  filter_params:
    ref_tile_size: ${tiling.params.requested_tile_size_px} # reference tile size at the target spacing
    a_t: 4 # area filter threshold for tissue (positive integer, the minimum size of detected foreground contours to consider, relative to the reference tile size ref_tile_size, e.g. a value 10 means only detected foreground contours of size greater than 10 [ref_tile_size, ref_tile_size] tiles at spacing tiling.params.requested_spacing_um will be kept)
    a_h: 2 # area filter threshold for holes (positive integer, the minimum size of detected holes/cavities in foreground contours to avoid, once again relative to the reference tile size ref_tile_size)
    filter_white: false # whether to filter out mostly white tiles
    filter_black: false # whether to filter out mostly black tiles
    white_threshold: 220 # threshold for white pixels (0-255)
    black_threshold: 25 # threshold for black pixels (0-255)
    fraction_threshold: 0.9 # fraction of pixels that must be white/black to filter out the tile
    filter_grayspace: false # whether to filter out tiles with too much low-saturation gray content
    grayspace_saturation_threshold: 0.05 # HSV saturation below which a pixel is considered gray
    grayspace_fraction_threshold: 0.6 # maximum allowed fraction of gray pixels
    filter_blur: false # whether to filter out blurry tiles using Laplacian variance
    blur_threshold: 50.0 # minimum blur score (higher is sharper)
    qc_spacing_um: 2.0 # spacing at which pixel-based QC is evaluated
  preview:
    save_mask_preview: true # save preview images of mask overlays
    save_tiling_preview: true # save preview images of tile layouts
    downsample: 32 # downsample to use for preview rendering
    tissue_contour_color: [157, 219, 129] # RGB color used for tissue contours in batch mask previews
    mask_overlay_alpha: 0.5 # alpha used for tissue overlays in batch mask previews

speed:
  precision: # model inference precision ["fp32", "fp16", "bf16"]; if not set, determined automatically based on model recommendations
  num_dataloader_workers: # number of DataLoader worker processes for reading tiles during embedding; defaults to auto (job CPU budget, except cuCIM on-the-fly uses cpu_budget // speed.num_cucim_workers)
  num_gpus: # number of GPUs to use for feature extraction; defaults to all available GPUs
  num_preprocessing_workers: # number of workers for hs2p tiling (WSI reading, JPEG encoding, tar writing); defaults to the runtime CPU budget capped at 64
  num_cucim_workers: 4 # number of internal cucim threads per read_region call (embedding path, on-the-fly only); DataLoader workers are auto-set to cpu_count // num_cucim_workers
  prefetch_factor_embedding: 4 # prefetch factor for tile embedding dataloaders

wandb:
  enable: false
  project: "" # wandb project name
  username: "" # wandb username
  exp_name: "" # wandb experiment name
  tags: ["features", "${model.name}", "${tiling.params.requested_tile_size_px}"] # wandb tags
  dir: "/home/user/"
  group:
  resume_id: "${resume_dirname}"
