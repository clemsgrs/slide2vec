csv: # path to csv containing slide paths

output_dir: "output" # output directory
resume: false # resume from a previous run
resume_dirname: # directory name to resume from

seed: 0 # seed for reproducibility

model:
  level: "tile" # level at which to extract the features ("tile", "region" or "slide")
  name: # foundation model name ["uni", "uni2", "virchow", "virchow2", "prov-gigapath", "h-optimus-0", "h-optimus-1", "pathojepa", "titan", "prism"] (leave empty when using a custom model)
  mode: "cls" # embedding mode ["cls", "full"]
  arch: # architecture of custom model
  pretrained_weights: # path to the pretrained weights when using a custom model
  batch_size: 256
  input_size: ${tiling.params.tile_size}
  restrict_to_tissue: false # whether to restrict tile content to tissue pixels only when feeding tile through encoder
  patch_size: 256 # if level is "region", size used to unroll the region into patches
  token_size: 16 # size of the tokens used model is a custom pretrained ViT
  save_tile_embeddings: false # whether to save tile embeddings alongside the pooled slide embedding when level is "slide"
  save_latents: false # whether to save the latent representations from the model alongside the slide embedding (only supported for 'prism')
  normalize_embeddings: false # L2 normalize tile embeddings (used by some custom checkpoints such as pathojepa)

speed:
  fp16: false # use mixed precision during model inference
  num_workers_embedding: 16 # number of workers for data loading when embedding slides
  persistent_workers_embedding: true # keep DataLoader workers alive across iterator re-creation for a slide
  prefetch_factor_embedding: 4 # number of batches prefetched per worker
  use_parquet: true # if false, use legacy TileDataset and read per-slide .npy coordinates directly
  max_open_slides_per_worker: 16 # worker-local LRU cache size for open WSI readers
  deterministic_inference: false # if true, force deterministic cuDNN behavior
  cudnn_benchmark: true # enable cuDNN autotuner for faster fixed-shape inference

wandb:
  enable: false
  project: "" # wandb project name
  username: "" # wandb username
  exp_name: "" # wandb experiment name
  tags: ["features", "${model.level}", "${tiling.params.tile_size}"] # wandb tags
  dir: "/home/user/"
  group:
  resume_id: "${resume_dirname}"
